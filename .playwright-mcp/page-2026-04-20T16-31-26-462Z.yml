      - img "5 Errores en Auditorías ISO por Mala Calibración (y Cómo Evitarlos)" [ref=e41]
      - generic [ref=e43]:
        - generic [ref=e44]:
          - paragraph [ref=e45]: La calibración es uno de los puntos que los auditores ISO revisan con mayor detalle — y también uno donde más empresas fallan. Según nuestra experiencia en cientos de auditorías, estos son los 5 errores que generan más no conformidades.
          - heading "1. Certificados de calibración vencidos" [level=2] [ref=e46]
          - paragraph [ref=e47]: El error más frecuente y el más evitable. Muchas empresas calibran sus equipos pero no gestionan activamente las fechas de vencimiento. Un certificado vencido al momento de la auditoría es una no conformidad inmediata en ISO 9001 cláusula 7.1.5 e IATF 16949.
          - paragraph [ref=e48]:
            - strong [ref=e49]: "Cómo evitarlo:"
            - text: Implementa un programa de calibración con alertas de vencimiento a 30, 60 y 90 días antes de la fecha límite. La plantilla de Plan Anual de Calibración que ofrecemos como recurso gratuito incluye este sistema.
          - heading "2. Ausencia de trazabilidad metrológica documentada" [level=2] [ref=e50]
          - paragraph [ref=e51]: "Un certificado de calibración sin trazabilidad al Sistema Internacional de Unidades (SI) no tiene validez ante un auditor certificado. La trazabilidad debe ser documentada e ininterrumpida: tu instrumento → patrón de trabajo → patrón de referencia → CENAM."
          - paragraph [ref=e52]:
            - strong [ref=e53]: "Cómo evitarlo:"
            - text: Exige a tu laboratorio de calibración que sus certificados indiquen explícitamente la trazabilidad CENAM y el número de acreditación de la EMA (Entidad Mexicana de Acreditación).
          - heading "3. Certificados sin cálculo de incertidumbre de medición" [level=2] [ref=e54]
          - paragraph [ref=e55]: ISO 17025, GMP y IATF 16949 requieren que los certificados de calibración incluyan la incertidumbre de medición calculada conforme a la Guía GUM. Sin este dato, el certificado no cumple con los requisitos normativos modernos.
          - paragraph [ref=e56]:
            - strong [ref=e57]: "Cómo evitarlo:"
            - text: Verifica que cada certificado incluya la sección de incertidumbre con el valor, factor de cobertura (k) y nivel de confianza. Si tu proveedor actual no lo incluye, es momento de cambiar.
          - heading "4. Instrumentos críticos fuera del programa de calibración" [level=2] [ref=e58]
          - paragraph [ref=e59]: "Es común encontrar que los instrumentos más visibles están calibrados pero se omiten equipos \"secundarios\" que en realidad son críticos para la calidad del producto: termómetros de referencia, medidores de humedad, niveles de precisión."
          - paragraph [ref=e60]:
            - strong [ref=e61]: "Cómo evitarlo:"
            - text: Realiza un inventario completo de todos los equipos que afectan la calidad del producto o servicio. Clasifícalos como críticos, importantes y de referencia, y asigna intervalos de calibración según su impacto.
          - heading "5. No verificar el estado de calibración antes de usar el equipo" [level=2] [ref=e62]
          - paragraph [ref=e63]: "Tener un certificado vigente no garantiza que el equipo esté funcionando correctamente. Los auditores preguntan: ¿cómo saben que el equipo funciona bien entre calibraciones? Sin un procedimiento de verificación intermedia, no hay respuesta."
          - paragraph [ref=e64]:
            - strong [ref=e65]: "Cómo evitarlo:"
            - text: Implementa verificaciones intermedias documentadas para equipos críticos. Puede ser tan simple como comparar lecturas contra un patrón de referencia interno y registrar el resultado.
          - separator [ref=e66]
          - paragraph [ref=e67]:
            - text: La buena noticia es que todos estos errores son prevenibles con un sistema de gestión de calibración bien estructurado. Si tu próxima auditoría ISO está a menos de 90 días,
            - link "contáctanos" [ref=e68] [cursor=pointer]:
              - /url: /contacto
            - text: para una evaluación rápida de tu sistema actual.
