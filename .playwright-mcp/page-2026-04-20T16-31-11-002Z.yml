          - heading "Patrones de Referencia" [level=3] [ref=e61]
          - paragraph [ref=e62]: Trabajamos con patrones primarios y secundarios calibrados directamente contra el CENAM, garantizando la máxima confiabilidad de cada certificado que emitimos.
