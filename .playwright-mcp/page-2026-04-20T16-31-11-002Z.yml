          - heading "Trazabilidad Metrológica" [level=3] [ref=e48]
          - paragraph [ref=e49]: Cada medición está vinculada al Sistema Internacional de Unidades (SI) a través de una cadena ininterrumpida de calibraciones. Nuestros patrones están trazados al CENAM (Centro Nacional de Metrología de México).
        - generic [ref=e50]:
