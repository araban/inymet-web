          - heading "Incertidumbre de Medición" [level=3] [ref=e55]
          - paragraph [ref=e56]: Todo certificado de calibración incluye el cálculo de incertidumbre de medición conforme a la Guía GUM (Guide to the Expression of Uncertainty in Measurement), requisito clave para auditorías ISO.
